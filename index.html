<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAUCHO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #000;
      font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
      color: #b88a3a;
    }
    /* Canvas must be fixed so it sits in the same stacking context as all UI overlays.
       Three.js sets width/height via inline style — don't override them here. */
    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      z-index: 0;
    }

    /* ── Crosshair ─────────────────────────────────────────────────────────── */
    body.game-active { cursor: none; }
    #crosshair {
      position: fixed; top: 0; left: 0;
      transform: translate(-50%, -50%);
      z-index: 50; pointer-events: none; display: none;
      width: 0; height: 0;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute;
      background: rgba(184, 138, 58, 0.85);
    }
    #crosshair::before { width: 1px; height: 14px; left: -1px; top: -7px; }
    #crosshair::after  { width: 14px; height: 1px; left: -7px; top: -1px; }
    #crosshair-dot {
      position: fixed; top: 0; left: 0;
      transform: translate(-50%, -50%);
      z-index: 51; pointer-events: none; display: none;
      width: 3px; height: 3px;
      background: rgba(232, 200, 112, 0.9);
      border-radius: 50%;
    }

    /* ── Hit marker ────────────────────────────────────────────────────────── */
    #hitmarker {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 60; pointer-events: none; display: none;
      font-size: 18px; color: #cc4422; font-weight: bold;
      text-shadow: 0 0 4px rgba(200,60,30,0.6);
    }

    /* ── Damage vignette ───────────────────────────────────────────────────── */
    #damage-overlay {
      position: fixed; inset: 0; z-index: 40; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(180,20,10,0.45) 100%);
      opacity: 0; transition: opacity 0.12s;
    }

    /* ── Death screen ──────────────────────────────────────────────────────── */
    #death-screen {
      position: fixed; inset: 0; z-index: 200;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.82); flex-direction: column; gap: 10px;
    }
    #death-screen .ds-box {
      border: 1px solid #6a3010;
      padding: 28px 48px;
      text-align: center;
      background: rgba(12,6,2,0.95);
    }
    #death-screen h2 {
      font-size: 22px; letter-spacing: 6px; color: #cc3322;
      text-transform: uppercase;
    }
    #death-screen p {
      font-size: 11px; color: #6a5030; margin-top: 10px;
      letter-spacing: 2px;
    }

    /* ── Stats HUD (bottom-left) ───────────────────────────────────────────── */
    #hud {
      position: fixed; bottom: 18px; left: 16px;
      z-index: 100; display: none;
      font-size: 12px; line-height: 1.9;
      pointer-events: none; user-select: none;
    }
    .stat-row {
      display: flex; align-items: center; gap: 6px;
    }
    .stat-label {
      width: 28px; color: #6a5030; text-transform: uppercase;
      font-size: 10px; letter-spacing: 1px;
    }
    .stat-bar {
      letter-spacing: -1px; font-size: 13px;
    }
    .stat-val {
      width: 26px; text-align: right; font-size: 10px;
      color: #7a6040; margin-left: 2px;
    }
    #stat-temp {
      margin-top: 3px; font-size: 10px;
      color: #6a5030; letter-spacing: 1px;
    }

    /* ── Top-right panel (time + score) ────────────────────────────────────── */
    #score {
      position: fixed; top: 14px; right: 14px;
      z-index: 100; display: none;
      font-size: 11px; text-align: right;
      line-height: 1.8; color: #7a6030;
      pointer-events: none; user-select: none;
    }
    #game-time {
      font-size: 14px; color: #c8a050; letter-spacing: 2px;
    }
    #score-kd { color: #7a6030; }
    #players-count {
      font-size: 10px; color: #50401a; margin-top: 2px;
    }
    #corral-count {
      font-size: 11px; color: #7a6030; margin-top: 4px; letter-spacing: 1px;
    }
    #stable-waypoint {
      font-size: 10px; color: #50401a; margin-top: 2px;
      letter-spacing: 1px; display: none;
    }
    #stable-waypoint .wp-arrow {
      display: inline-block; color: #c8a050; margin-right: 3px;
    }

    /* ── Kill feed (top-left) ──────────────────────────────────────────────── */
    #killfeed {
      position: fixed; top: 14px; left: 14px;
      z-index: 100; display: none;
      font-size: 11px; line-height: 1.7;
      pointer-events: none; user-select: none;
    }
    .kill-msg {
      color: #7a6030;
      animation: kfFade 5s forwards;
      white-space: nowrap;
    }
    .kill-msg b { color: #c8a050; font-weight: normal; }
    @keyframes kfFade {
      0%,65% { opacity: 1; }
      100%   { opacity: 0; }
    }

    /* ── Room link (bottom-right) ──────────────────────────────────────────── */
    #room-link {
      position: fixed; bottom: 14px; right: 14px;
      z-index: 100; display: none;
      font-size: 10px; color: #3a2c10;
      cursor: pointer; letter-spacing: 1px;
      transition: color 0.15s;
    }
    #room-link:hover { color: #7a5820; }

    /* ── Coords (bottom, above room link) ──────────────────────────────────── */
    #coords-display {
      position: fixed; bottom: 32px; right: 14px;
      z-index: 100; display: none;
      font-size: 10px; color: #3a2c10;
      cursor: pointer; letter-spacing: 1px;
      transition: color 0.15s;
    }
    #coords-display:hover { color: #7a5820; }

    /* ── Lobby ─────────────────────────────────────────────────────────────── */
    #lobby {
      position: fixed; inset: 0; z-index: 999;
      display: flex; align-items: center; justify-content: center;
      background: #0c0904; flex-direction: column; gap: 0;
    }
    #lobby-box {
      display: flex; flex-direction: column; align-items: center;
      gap: 0;
    }
    .lobby-border-top {
      font-size: 13px; color: #4a3010; letter-spacing: 1px;
      white-space: pre;
    }
    #lobby h1 {
      font-size: 28px; letter-spacing: 10px; color: #c8a050;
      padding: 14px 40px; border-left: 1px solid #4a3010;
      border-right: 1px solid #4a3010;
      text-align: center;
    }
    .lobby-border-bot {
      font-size: 13px; color: #4a3010; letter-spacing: 1px;
      white-space: pre;
    }
    .lobby-spacer { height: 28px; }
    #lobby-label {
      font-size: 10px; color: #4a3010; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 6px;
    }
    #lobby-input-row {
      display: flex; align-items: center; gap: 0;
      margin-bottom: 20px;
    }
    #lobby-cursor {
      color: #c8a050; font-size: 13px; margin-right: 4px;
    }
    #name-input {
      background: none; border: none; outline: none;
      color: #c8a050; font-family: inherit; font-size: 13px;
      width: 180px; caret-color: #c8a050;
      border-bottom: 1px solid #4a3010; padding: 2px 0;
    }
    #name-input::placeholder { color: #3a2808; }
    #play-btn {
      border: 1px solid #4a3010; background: none;
      color: #b88a3a; font-family: inherit; font-size: 12px;
      padding: 8px 28px; cursor: pointer; letter-spacing: 4px;
      text-transform: uppercase; transition: border-color 0.15s, color 0.15s;
    }
    #play-btn:hover {
      border-color: #c8a050; color: #e8c870;
    }
    .lobby-hint {
      font-size: 10px; color: #3a2808; letter-spacing: 2px;
      margin-top: 22px; text-align: center;
    }
  </style>
</head>
<body>

  <!-- ── Lobby ────────────────────────────────────────────────────────────── -->
  <div id="lobby">
    <div id="lobby-box">
      <div class="lobby-border-top">╔══════════════════════════════╗</div>
      <h1>G A U C H O</h1>
      <div class="lobby-border-bot">╚══════════════════════════════╝</div>
      <div class="lobby-spacer"></div>
      <div id="lobby-label">nombre</div>
      <div id="lobby-input-row">
        <span id="lobby-cursor">&gt;</span>
        <input id="name-input" type="text" placeholder="gaucho" maxlength="16" autocomplete="off" />
      </div>
      <button id="play-btn">[ jugar ]</button>
      <div class="lobby-hint">WASD &middot; MOUSE apuntar &middot; CLICK disparar &middot; ESPACIO saltar &middot; E montar</div>
    </div>
  </div>

  <!-- ── Game layer ────────────────────────────────────────────────────────── -->
  <div id="crosshair"></div>
  <div id="crosshair-dot"></div>
  <div id="hitmarker">×</div>
  <div id="damage-overlay"></div>

  <div id="death-screen">
    <div class="ds-box">
      <h2>MUERTO</h2>
      <p>respawning...</p>
    </div>
  </div>

  <!-- Stats HUD: bottom-left -->
  <div id="hud">
    <div class="stat-row">
      <span class="stat-label">VID</span>
      <span class="stat-bar" id="bar-hp"  style="color:#883322;"></span>
      <span class="stat-val" id="val-hp">100</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">HAM</span>
      <span class="stat-bar" id="bar-ham" style="color:#7a5520;"></span>
      <span class="stat-val" id="val-ham">100</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">SED</span>
      <span class="stat-bar" id="bar-sed" style="color:#225566;"></span>
      <span class="stat-val" id="val-sed">100</span>
    </div>
    <div id="stat-temp">TEMP --°C</div>
  </div>

  <!-- Score + time: top-right -->
  <div id="score">
    <div id="game-time">--:--</div>
    <div id="score-kd">K:0  M:0</div>
    <div id="players-count">1 online</div>
    <div id="corral-count">VACAS: 0/33</div>
    <div id="stable-waypoint"><span class="wp-arrow">↑</span><span class="wp-info"></span></div>
  </div>

  <!-- Kill feed: top-left -->
  <div id="killfeed"></div>

  <!-- Room link: bottom-right -->
  <div id="room-link"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
